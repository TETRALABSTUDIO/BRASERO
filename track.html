<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Track your order · Brasero</title>
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
<link rel="apple-touch-icon" href="assets/favicon.svg">
<link rel="preconnect" href="https://api.fontshare.com">
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@300,400,500,700,900&display=swap" rel="stylesheet">
<style>
:root{--black:#0c0c0c;--ink:#111;--soft:#f7f4ef;--grey:#6b6b6b;--line:rgba(0,0,0,.10);--orange:#f87000;--grad:linear-gradient(100deg,#ff1a00 0%,#f87000 100%);}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Satoshi',system-ui,sans-serif;background:#fff;color:var(--ink);-webkit-font-smoothing:antialiased;overflow-x:hidden}
a{color:inherit;text-decoration:none}
.grad-text{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:9px;font-family:inherit;font-weight:700;font-size:15px;letter-spacing:-.01em;padding:13px 24px;border-radius:100px;border:1px solid transparent;cursor:pointer;transition:transform .25s,box-shadow .25s,color .2s}
.btn:hover{transform:translateY(-2px)}
.btn--grad{background:var(--grad);color:#fff;box-shadow:0 10px 26px rgba(248,80,0,.3)}
.btn--grad:hover{box-shadow:0 16px 38px rgba(248,80,0,.42)}
.btn--ghost{background:transparent;border-color:rgba(0,0,0,.16);color:var(--ink)}
.btn--ghost:hover{border-color:var(--ink)}
.btn--sm{padding:9px 16px;font-size:13px}
.btn[disabled]{opacity:.5;pointer-events:none}

.glow{position:fixed;width:560px;height:560px;border-radius:50%;background:radial-gradient(closest-side,rgba(248,80,0,.13),transparent 72%);filter:blur(30px);pointer-events:none;top:-200px;right:-160px;z-index:0}
.top{display:flex;align-items:center;justify-content:space-between;max-width:880px;margin:0 auto;padding:18px 24px 2px;position:relative;z-index:2}
.logo-svg{height:26px;width:auto;color:var(--ink)}
.top a.help{font-size:13px;font-weight:700;color:var(--grey)}
.shell{position:relative;z-index:2;max-width:880px;margin:0 auto;padding:8px 24px 60px}

.eyebrow{display:inline-flex;align-items:center;gap:8px;font-size:12px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--orange);margin-bottom:10px}
.eyebrow .pxa{display:inline-flex;gap:3px}
.eyebrow .pxa i{width:8px;height:11px;border-radius:3px;background-image:url(assets/pxgrad.svg);background-size:100% 100%;image-rendering:pixelated}
h1.title{font-size:clamp(26px,4vw,40px);font-weight:900;letter-spacing:-.038em;line-height:1.0}
.lead{color:var(--grey);font-size:15px;line-height:1.45;margin-top:10px;max-width:42em}

/* gate */
.gate{max-width:430px;margin:6vh auto 0;background:#fff;border:1px solid var(--line);border-radius:22px;padding:28px;box-shadow:0 14px 40px rgba(0,0,0,.06)}
.field{margin-bottom:14px}
.field label{display:block;font-size:13px;font-weight:700;margin-bottom:6px}
.field input{width:100%;font-family:inherit;font-size:15px;padding:12px 14px;border:1px solid var(--line);border-radius:12px;background:var(--soft);outline:none;transition:border .2s,box-shadow .2s;color:var(--ink)}
.field input:focus{border-color:var(--orange);box-shadow:0 0 0 3px rgba(248,80,0,.12);background:#fff}
.err{color:#d11;font-size:13px;font-weight:600;min-height:18px;margin:2px 0 6px}

/* dashboard head */
.ohead{display:flex;flex-wrap:wrap;align-items:flex-end;justify-content:space-between;gap:14px;margin:8px 0 22px}
.obadge{display:inline-flex;align-items:center;gap:8px;font-size:13px;font-weight:700;background:var(--soft);border:1px solid var(--line);border-radius:100px;padding:7px 14px}
.obadge b{font-weight:900}

/* progress */
.prog-card{background:#fff;border:1px solid var(--line);border-radius:20px;padding:22px 24px;box-shadow:0 12px 34px rgba(0,0,0,.05);margin-bottom:26px}
.pbar{height:8px;border-radius:100px;background:rgba(0,0,0,.07);overflow:hidden;margin:4px 0 20px}
.pbar i{display:block;height:100%;border-radius:100px;background:var(--grad);transition:width .7s cubic-bezier(.4,0,.2,1)}
.steps{display:flex;gap:6px;overflow-x:auto}
.step{flex:1;min-width:92px;text-align:center}
.step .dot{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;margin:0 auto 8px;background:#fff;border:1px solid var(--line);color:#bdbdbd;font-weight:900;font-size:13px;transition:.35s}
.step.done .dot,.step.active .dot{background:var(--grad);color:#fff;border-color:transparent;box-shadow:0 8px 18px rgba(248,80,0,.28)}
.step.done .dot{font-size:0}.step.done .dot::after{content:"✓";font-size:15px}
.step .lab{font-size:11.5px;font-weight:700;color:#bdbdbd;transition:.35s;letter-spacing:-.01em}
.step.done .lab,.step.active .lab{color:var(--ink)}

/* decks */
.sec-h{font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--grey);margin:0 0 12px}
.decks-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;align-items:stretch}
.deck{background:#fff;border:1px solid var(--line);border-radius:18px;padding:16px 17px;box-shadow:0 8px 24px rgba(0,0,0,.045)}
.deck__top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:4px}
.deck__title{font-size:16px;font-weight:900;letter-spacing:-.02em;line-height:1.2}
.pill{font-size:11.5px;font-weight:800;letter-spacing:.02em;padding:5px 11px;border-radius:100px;white-space:nowrap}
.pill--wait{background:#f1f1f1;color:#777}
.pill--act{background:rgba(248,80,0,.12);color:#c64600}
.pill--done{background:rgba(22,163,74,.12);color:#15803d}
.deck__hint{font-size:12.5px;color:var(--grey);line-height:1.45;margin:3px 0 0}
.deck__body{margin-top:12px}
textarea.script{width:100%;min-height:120px;font-family:inherit;font-size:13.5px;line-height:1.55;padding:12px;border:1px solid var(--line);border-radius:12px;background:var(--soft);outline:none;resize:vertical;color:var(--ink)}
textarea.script:focus{border-color:var(--orange);box-shadow:0 0 0 3px rgba(248,80,0,.10);background:#fff}
textarea.script[readonly]{background:#fafafa;color:#555}
/* small image thumbnails */
.gal{display:flex;flex-wrap:wrap;gap:7px}
.gal img{width:62px;height:62px;object-fit:cover;border-radius:10px;border:1px solid var(--line);cursor:zoom-in;transition:transform .15s,box-shadow .15s}
.gal img:hover{transform:scale(1.05);box-shadow:0 6px 16px rgba(0,0,0,.18)}
.gal .dl{display:flex;align-items:center;padding:0 12px;font-weight:700;color:var(--orange);font-size:13px;border:1px dashed var(--line);border-radius:10px}
.galcount{font-size:11.5px;color:var(--grey);font-weight:700;margin:0 0 6px}
.actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
/* uniform two-stage card */
.deck{display:flex;flex-direction:column}
.stages{display:flex;flex-direction:column;gap:10px;margin-top:12px}
.stage{border:1px solid var(--line);border-radius:13px;padding:13px 14px;background:#fff}
.stage.locked{background:var(--soft);opacity:.7}
.stage.pending{background:var(--soft)}
.stage.approved{border-color:rgba(22,163,74,.32);background:rgba(22,163,74,.045)}
.stage.active{border-color:rgba(248,80,0,.45);box-shadow:0 0 0 2px rgba(248,80,0,.10)}
.stage__h{display:flex;align-items:center;gap:8px;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--grey);margin-bottom:9px}
.stage__h .num{width:19px;height:19px;border-radius:50%;display:grid;place-items:center;font-size:10.5px;color:#fff;background:#cbcbcb;flex-shrink:0}
.stage.active .num,.stage.pending .num{background:var(--grad)}
.stage.approved .num{background:#15803d}
.stagemsg{font-size:12.5px;color:var(--grey);line-height:1.45}
.scriptview{background:var(--soft);border-radius:9px;padding:10px;font-size:12.5px;line-height:1.5;white-space:pre-wrap;color:#555;max-height:90px;overflow:auto}
/* lightbox */
.lb{position:fixed;inset:0;background:rgba(12,12,12,.86);display:none;align-items:center;justify-content:center;z-index:50;padding:24px;cursor:zoom-out}
.lb.open{display:flex}
.lb img{max-width:92vw;max-height:88vh;border-radius:12px;box-shadow:0 30px 80px rgba(0,0,0,.5)}
.note{font-size:13px;color:#c64600;background:rgba(248,80,0,.07);border-radius:10px;padding:10px 12px;margin-top:12px}
.revbox{margin-top:12px;display:none}
.revbox.open{display:block}
.empty{text-align:center;color:var(--grey);padding:34px;border:1px dashed var(--line);border-radius:18px}
.spin{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.45);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.hide{display:none!important}
@media(max-width:560px){.step{min-width:70px}.step .lab{font-size:10.5px}}
</style>
</head>

<header class="top">
  <a href="index.html" aria-label="Brasero home"><svg class="logo-svg" viewBox="0 0 798 189" fill="none"><use href="#brasero-mark"/></svg></a>
  <div style="display:flex;align-items:center;gap:16px">
    <a class="btn btn--grad btn--sm" href="index.html#packages">+ Place a new order</a>
    <a class="help" href="mailto:hello@brasero.studio">Need help?</a>
  </div>
</header>

<div class="glow"></div>

<main class="shell">

  <!-- ===== GATE ===== -->
  <section id="gate">
    <div class="gate">
      <span class="eyebrow"><span class="pxa"><i></i><i></i><i></i></span>Order tracking</span>
      <h1 class="title" style="font-size:26px">Track your <span class="grad-text">decks</span></h1>
      <p class="lead" style="margin-bottom:20px">Enter your order number and the email you used at checkout.</p>
      <form id="gateForm">
        <div class="field"><label>Order number</label><input id="ref" placeholder="A1B2C3D4" autocomplete="off" required></div>
        <div class="field"><label>Email</label><input id="email" type="email" placeholder="you@email.com" required></div>
        <div class="err" id="gateErr"></div>
        <button class="btn btn--grad" id="gateBtn" style="width:100%" type="submit">View my order →</button>
      </form>
    </div>
  </section>

  <!-- ===== DASHBOARD ===== -->
  <section id="dash" class="hide">
    <div class="ohead">
      <div>
        <span class="eyebrow"><span class="pxa"><i></i><i></i><i></i></span>Your order</span>
        <h1 class="title" id="hello">Welcome back</h1>
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <span class="obadge">Order <b id="oref">#—</b></span>
        <span class="obadge" id="oplan"></span>
        <button class="btn btn--ghost btn--sm" id="logout">Sign out</button>
      </div>
    </div>

    <div class="prog-card">
      <div class="pbar"><i id="pfill" style="width:0"></i></div>
      <div class="steps" id="steps"></div>
    </div>

    <h3 class="sec-h">Your decks</h3>
    <div id="decks" class="decks-grid"></div>
  </section>

</main>

<div class="lb" id="lb"><img id="lbImg" alt=""></div>

<script>
const API=(location.hostname==='localhost'||location.hostname==='127.0.0.1')?'http://localhost:4242':'';
const $=s=>document.querySelector(s);
const esc=s=>(s||'').toString().replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

let CREDS={ref:'',email:''};
const PLAN_NAMES={starter:'Ember',flame:'Flame',burst:'Meteor'};

const TAG={
  writing:      ['pill--wait','Writing script'],
  script_review:['pill--act', 'Your turn · script'],
  designing:    ['pill--wait','In design'],
  design_review:['pill--act', 'Your turn · design'],
  revision:     ['pill--wait','Retouch in progress'],
  done:         ['pill--done','Approved ✓'],
};

/* ---------- gate ---------- */
$('#gateForm').addEventListener('submit', async e=>{
  e.preventDefault();
  const ref=$('#ref').value.trim().replace(/^#/,'');
  const email=$('#email').value.trim();
  if(!ref||!email) return;
  await load(ref,email);
});

async function load(ref,email,silent){
  const btn=$('#gateBtn'); if(!silent){btn.disabled=true;btn.innerHTML='<span class="spin"></span>';}
  $('#gateErr').textContent='';
  try{
    const r=await fetch(API+'/api/order',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({ref,email})});
    const d=await r.json();
    if(!r.ok||!d.ok){
      if(!silent){$('#gateErr').textContent = r.status===404?"We couldn't find an order with those details.":'Something went wrong. Please try again.';}
      else logout();
      return;
    }
    CREDS={ref,email};
    localStorage.setItem('brasero_track',JSON.stringify(CREDS));
    render(d.order);
  }catch(err){ if(!silent)$('#gateErr').textContent='Network error. Please try again.'; }
  finally{ btn.disabled=false; btn.textContent='View my order →'; }
}

function logout(){
  localStorage.removeItem('brasero_track');
  CREDS={ref:'',email:''};
  $('#dash').classList.add('hide'); $('#gate').classList.remove('hide');
  history.replaceState(null,'','track.html');
}
$('#logout').addEventListener('click',logout);

/* ---------- render ---------- */
function render(o){
  $('#gate').classList.add('hide'); $('#dash').classList.remove('hide');
  $('#hello').innerHTML = o.name ? `Hi <span class="grad-text">${esc(o.name.split(' ')[0])}</span>` : 'Your <span class="grad-text">decks</span>';
  $('#oref').textContent = '#'+o.ref;
  $('#oplan').textContent = o.plan ? ((PLAN_NAMES[o.plan]||o.plan)+' pack') : '';
  $('#oplan').style.display = o.plan?'':'none';

  const p=o.progress;
  $('#pfill').style.width=p.percent+'%';
  $('#steps').innerHTML=p.steps.map((s,i)=>{
    const cls=i<p.active?'done':(i===p.active?'active':'');
    return `<div class="step ${cls}"><div class="dot">${i+1}</div><div class="lab">${esc(s)}</div></div>`;
  }).join('');

  const wrap=$('#decks');
  if(!o.decks.length){
    wrap.className='';
    wrap.innerHTML='<div class="empty">Your decks will appear here as soon as we start production. We\'ll email you at every step. 🔥</div>';
    return;
  }
  wrap.className='decks-grid';
  wrap.innerHTML=o.decks.map(deckHTML).join('');
  o.decks.forEach(bindDeck);
}

function deckHTML(d){
  const [pc,pl]=TAG[d.status]||TAG.writing;
  const scriptApproved=['designing','design_review','revision','done'].includes(d.status);

  // ---- stage 1: script ----
  let s1;
  if(d.status==='writing'){
    s1=`<div class="stage pending"><div class="stage__h"><span class="num">1</span> Script</div>
      <p class="stagemsg">✍️ We're writing the script for this deck. We'll email you the moment it's ready.</p></div>`;
  } else if(d.status==='script_review'){
    s1=`<div class="stage active"><div class="stage__h"><span class="num">1</span> Script · your turn</div>
      <p class="stagemsg" style="margin-bottom:10px">Tweak anything you like, then approve it to move into design.</p>
      <textarea class="script" data-id="${d.id}">${esc(d.script)}</textarea>
      <div class="actions"><button class="btn btn--grad btn--sm" data-act="validate_script" data-id="${d.id}">Approve script ✓</button></div></div>`;
  } else {
    s1=`<div class="stage approved"><div class="stage__h"><span class="num">✓</span> Script · approved</div>
      ${d.script?`<details><summary style="cursor:pointer;font-weight:700;font-size:12px;color:var(--grey)">View script</summary><div class="scriptview" style="margin-top:8px">${esc(d.script)}</div></details>`:'<p class="stagemsg">Approved.</p>'}</div>`;
  }

  // ---- stage 2: design ----
  let s2;
  if(!scriptApproved){
    s2=`<div class="stage locked"><div class="stage__h"><span class="num">2</span> Design</div>
      <p class="stagemsg">🔒 Unlocks once you approve the script.</p></div>`;
  } else if(d.status==='designing'){
    s2=`<div class="stage pending"><div class="stage__h"><span class="num">2</span> Design</div>
      <p class="stagemsg">🎨 Script approved — our designers are building this deck now.</p></div>`;
  } else if(d.status==='design_review'){
    s2=`<div class="stage active"><div class="stage__h"><span class="num">2</span> Design · your turn</div>
      ${galleryHTML(d)}
      <div class="actions">
        <button class="btn btn--grad btn--sm" data-act="validate_design" data-id="${d.id}">Approve ✓</button>
        <button class="btn btn--ghost btn--sm" data-act="toggle_rev" data-id="${d.id}">Retouch</button>
      </div>
      <div class="revbox" id="rev-${d.id}">
        <textarea class="script" placeholder="What would you like us to change?" data-rev="${d.id}" style="min-height:80px;margin-top:8px"></textarea>
        <div class="actions"><button class="btn btn--grad btn--sm" data-act="request_revision" data-id="${d.id}">Send retouch →</button></div>
      </div></div>`;
  } else if(d.status==='revision'){
    s2=`<div class="stage pending"><div class="stage__h"><span class="num">2</span> Design</div>
      <p class="stagemsg">✏️ Applying your retouch — we'll resend it for approval shortly.</p>
      ${d.revision_note?`<div class="note" style="margin-top:10px"><b>Your retouch:</b> ${esc(d.revision_note)}</div>`:''}</div>`;
  } else { // done
    s2=`<div class="stage approved"><div class="stage__h"><span class="num">✓</span> Design · approved</div>
      ${d.images.length?galleryHTML(d):'<p class="stagemsg">Approved & ready to post. 🔥</p>'}</div>`;
  }

  return `<div class="deck">
    <div class="deck__top"><div class="deck__title">${esc(d.title)}</div><span class="pill ${pc}">${pl}</span></div>
    <div class="stages">${s1}${s2}</div>
  </div>`;
}

function galleryHTML(d){
  const imgs=d.images||[]; if(!imgs.length) return '';
  return `<p class="galcount">${imgs.length} image${imgs.length>1?'s':''}</p>
    <div class="gal">${imgs.map(u=>`<img src="${esc(u)}" alt="" loading="lazy" data-full="${esc(u)}">`).join('')}</div>`;
}

/* ---------- actions ---------- */
function bindDeck(d){
  document.querySelectorAll(`[data-id="${d.id}"]`).forEach(el=>{
    if(el.dataset.act) el.addEventListener('click',()=>onAction(el));
  });
}

async function onAction(el){
  const act=el.dataset.act, id=el.dataset.id;
  if(act==='toggle_rev'){ $('#rev-'+id).classList.toggle('open'); return; }
  const payload={...CREDS,deckId:id,action:act};
  if(act==='validate_script'){
    const ta=document.querySelector(`textarea.script[data-id="${id}"]`);
    payload.script = ta?ta.value:'';
    if(!confirm('Approve this script and move it into design?')) return;
  }
  if(act==='validate_design'){ if(!confirm('Approve this design as final?')) return; }
  if(act==='request_revision'){
    const ta=document.querySelector(`textarea[data-rev="${id}"]`);
    payload.note=ta?ta.value.trim():'';
    if(!payload.note){ alert('Tell us what to change first.'); return; }
  }
  const old=el.innerHTML; el.disabled=true; el.innerHTML='<span class="spin"></span>';
  try{
    const r=await fetch(API+'/api/deck',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    const dt=await r.json();
    if(!r.ok||!dt.ok){ alert('Could not save. Please refresh and try again.'); el.disabled=false; el.innerHTML=old; return; }
    render(dt.order);
  }catch(e){ alert('Network error.'); el.disabled=false; el.innerHTML=old; }
}

/* ---------- lightbox ---------- */
document.addEventListener('click',e=>{
  const t=e.target;
  if(t.matches&&t.matches('.gal img')){ $('#lbImg').src=t.dataset.full; $('#lb').classList.add('open'); }
});
$('#lb').addEventListener('click',()=>$('#lb').classList.remove('open'));
document.addEventListener('keydown',e=>{ if(e.key==='Escape') $('#lb').classList.remove('open'); });

/* ---------- boot: deep-link or saved session ---------- */
(function(){
  const q=new URLSearchParams(location.search);
  const ref=q.get('ref'), email=q.get('email');
  if(ref&&email){ $('#ref').value=ref; $('#email').value=email; load(ref,email); return; }
  const saved=localStorage.getItem('brasero_track');
  if(saved){ try{ const c=JSON.parse(saved); if(c.ref&&c.email) load(c.ref,c.email,true); }catch(e){} }
})();
</script>
