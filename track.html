<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex">
<title>Brasero</title>
<link rel="icon" href="assets/favicon.svg">
<!-- track.html retired in Phase 5: the client tracker now lives in the unified
     app (app.html, role 'client'). Redirect old bookmarks / email links to it.
     Legacy deep links (?ref=..&email=..) become ?order=..&email=.. so app.html
     can prefill the sign-in and reopen that order after the magic link. -->
<script>
(function () {
  var p = new URLSearchParams(location.search);
  var ref = p.get('ref'), email = p.get('email');
  var q = '';
  if (ref) q = '?order=' + encodeURIComponent(ref) + (email ? '&email=' + encodeURIComponent(email) : '');
  location.replace('app.html' + q + location.hash);
})();
</script>
</head>
<body></body>
</html>
