<!-- the active role bundle mounts into here -->
<main id="app"></main>

<!-- boot loader (kept inline + tiny; bundles are external modules) -->
<script type="module">
import { post, getToken, setToken, sessionRole, decodeToken } from './app.core.js';

const app = document.getElementById('app');
const LOGO = '<svg class="logo-svg" viewBox="0 0 798 189" fill="none"><use href="#brasero-mark"/></svg>';

/* 1. Exchange a magic-link token in the URL for a long-lived session. */
async function consumeMagic() {
  const params = new URLSearchParams(location.search);
  const magic = params.get('magic');
  if (!magic) return;
  app.innerHTML = `<div class="authwrap" style="text-align:center">${LOGO}<p>Signing you in…</p></div>`;
  const d = await post('/api/auth', { action: 'verify_magic', token: magic });
  if (d && d.ok && d.token) setToken(d.token);
  // Drop the token from the URL either way (avoid replay / leaks in history).
  history.replaceState(null, '', 'app.html');
  if (!d || !d.ok) renderLogin('That sign-in link is invalid or expired. Request a new one below.');
}

/* 2. Route an authenticated session to its role bundle (lazy per-role load). */
async function route() {
  const role = sessionRole();
  if (!role) return renderLogin();
  const file = role === 'owner' ? './app.owner.js'
             : role === 'talent' ? './app.talent.js'
             : './app.client.js';
  const ctx = { session: decodeToken(getToken()) || {}, role };
  app.innerHTML = `<div class="authwrap" style="text-align:center">${LOGO}<p>Loading…</p></div>`;
  try {
    const mod = await import(file);
    await mod.mount(app, ctx);
  } catch (e) {
    renderLogin('Something went wrong loading your workspace. Please sign in again.');
  }
}

/* 3. Login screen — client magic link by default, team password on toggle. */
function renderLogin(error) {
  app.innerHTML = `
    <div class="authwrap">
      ${LOGO}
      <h1>Sign in</h1>
      <p>Enter your email and we'll send you a secure sign-in link. No password needed.</p>
      <form id="magicForm">
        <div class="field">
          <label for="mEmail">Email</label>
          <input id="mEmail" type="email" autocomplete="email" placeholder="you@email.com" required>
        </div>
        <button class="btn btn--grad" style="width:100%" type="submit" id="mBtn">Email me a sign-in link</button>
        <div class="err" id="mErr">${error ? error : ''}</div>
      </form>
      <div class="authnote hide" id="mSent">Check your inbox — if that email has an account, a sign-in link is on its way. 🔥</div>
      <div class="authswap">
        Team member? <button type="button" id="teamToggle">Sign in with password</button>
      </div>
      <form id="teamForm" class="hide" style="margin-top:14px">
        <div class="field"><label for="tEmail">Email</label><input id="tEmail" type="email" autocomplete="email" required></div>
        <div class="field"><label for="tPass">Password</label><input id="tPass" type="password" autocomplete="current-password" required></div>
        <button class="btn btn--ghost" style="width:100%" type="submit" id="tBtn">Sign in</button>
        <div class="err" id="tErr"></div>
      </form>
    </div>`;

  const magicForm = document.getElementById('magicForm');
  magicForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('mBtn');
    const email = document.getElementById('mEmail').value.trim();
    document.getElementById('mErr').textContent = '';
    btn.disabled = true; btn.innerHTML = '<span class="spin"></span>';
    try { await post('/api/auth', { action: 'request_magic', email }); } catch {}
    magicForm.classList.add('hide');
    document.getElementById('mSent').classList.remove('hide');
  });

  document.getElementById('teamToggle').addEventListener('click', () => {
    document.getElementById('teamForm').classList.toggle('hide');
  });

  const teamForm = document.getElementById('teamForm');
  teamForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('tBtn');
    const email = document.getElementById('tEmail').value.trim();
    const password = document.getElementById('tPass').value;
    document.getElementById('tErr').textContent = '';
    btn.disabled = true; btn.innerHTML = '<span class="spin"></span>';
    try {
      const d = await post('/api/auth', { action: 'login', email, password });
      if (!d || !d.ok || !d.token) { document.getElementById('tErr').textContent = 'Invalid email or password.'; btn.disabled = false; btn.textContent = 'Sign in'; return; }
      setToken(d.token);
      route();
    } catch {
      document.getElementById('tErr').textContent = 'Something went wrong. Try again.';
      btn.disabled = false; btn.textContent = 'Sign in';
    }
  });
}

/* boot */
(async () => {
  await consumeMagic();
  if (getToken()) route();
  else if (!app.querySelector('.authwrap')) renderLogin();
})();
</script>
