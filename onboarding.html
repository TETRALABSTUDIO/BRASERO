<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Onboarding · Brasero</title>
<link rel="preconnect" href="https://api.fontshare.com">
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@300,400,500,700,900&display=swap" rel="stylesheet">
<style>
:root{--black:#0c0c0c;--ink:#111;--soft:#f7f4ef;--grey:#6b6b6b;--line:rgba(0,0,0,.10);--orange:#f87000;--grad:linear-gradient(100deg,#ff1a00 0%,#f87000 100%);}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{font-family:'Satoshi',system-ui,sans-serif;background:#fff;color:var(--ink);-webkit-font-smoothing:antialiased;overflow-x:hidden}
a{color:inherit;text-decoration:none}
.grad-text{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:9px;font-family:inherit;font-weight:700;font-size:15px;letter-spacing:-.01em;padding:13px 24px;border-radius:100px;border:1px solid transparent;cursor:pointer;transition:transform .25s,box-shadow .25s,color .2s}
.btn:hover{transform:translateY(-2px)}
.btn--grad{background:var(--grad);color:#fff;box-shadow:0 10px 26px rgba(248,80,0,.3)}
.btn--grad:hover{box-shadow:0 16px 38px rgba(248,80,0,.42)}
.btn--ghost{background:transparent;border-color:rgba(0,0,0,.16);color:var(--ink)}
.btn--ghost:hover{border-color:var(--ink)}

.prog{position:fixed;top:0;left:0;right:0;height:4px;background:rgba(0,0,0,.06);z-index:10}
.prog__bar{height:100%;width:0;background:var(--grad);transition:width .5s cubic-bezier(.4,0,.2,1)}
.top{display:flex;align-items:center;justify-content:space-between;max-width:760px;margin:0 auto;padding:16px 24px 2px}
.logo-svg{height:24px;width:auto;color:var(--ink)}
.stepcount{font-size:13px;font-weight:700;color:var(--grey)}
.glow{position:fixed;width:560px;height:560px;border-radius:50%;background:radial-gradient(closest-side,rgba(248,80,0,.13),transparent 72%);filter:blur(30px);pointer-events:none;top:-180px;right:-160px;z-index:0}

.shell{position:relative;z-index:2;max-width:680px;margin:0 auto;padding:4px 24px 26px}

/* stepper */
.stepper{display:flex;align-items:center;justify-content:center;margin:8px 0 18px}
.snode{display:flex;align-items:center;gap:9px}
.snum{width:36px;height:36px;border-radius:11px;display:grid;place-items:center;font-weight:900;font-size:15px;background:#fff;border:1px solid var(--line);color:#bdbdbd;transition:.35s;flex-shrink:0}
.snode.active .snum,.snode.done .snum{background:var(--grad);color:#fff;border-color:transparent;box-shadow:0 8px 18px rgba(248,80,0,.28)}
.snode.done .snum{font-size:0}.snode.done .snum::after{content:"✓";font-size:16px}
.slabel{font-size:13px;font-weight:700;color:#bdbdbd;transition:.35s;white-space:nowrap}
.snode.active .slabel,.snode.done .slabel{color:var(--ink)}
.sline{width:40px;height:2px;background:var(--line);margin:0 10px;border-radius:2px;transition:.35s}
.sline.fill{background:var(--grad)}

/* intro */
.intro{margin-bottom:16px}
.eyebrow{display:inline-flex;align-items:center;gap:8px;font-size:12px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--orange);margin-bottom:9px}
.eyebrow .pxa{display:inline-flex;gap:3px}
.eyebrow .pxa i{width:8px;height:11px;border-radius:3px;background-image:url(assets/pxgrad.svg);background-size:100% 100%;image-rendering:pixelated}
.eyebrow .pxa i:nth-child(1){transform:rotate(-10deg);opacity:.6}
.eyebrow .pxa i:nth-child(3){transform:rotate(10deg)}
h1.title{font-size:clamp(25px,3.6vw,38px);font-weight:900;letter-spacing:-.038em;line-height:1.0}
.intro p{color:var(--grey);font-size:15px;line-height:1.45;margin-top:9px;max-width:40em}

/* card + fields */
.card{background:#fff;border:1px solid var(--line);border-radius:22px;padding:24px;box-shadow:0 14px 40px rgba(0,0,0,.06);animation:fin .4s cubic-bezier(.2,.7,.2,1)}
@keyframes fin{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
.who{display:flex;align-items:center;gap:13px;padding:11px 13px;border:1px solid var(--line);border-radius:14px;background:var(--soft);margin-bottom:16px}
.who img{width:44px;height:44px;border-radius:50%;object-fit:cover;flex-shrink:0;border:2px solid #fff;box-shadow:0 4px 10px rgba(0,0,0,.12)}
.who .ph{width:44px;height:44px;border-radius:50%;background:var(--grad);display:grid;place-items:center;color:#fff;font-weight:900;font-size:18px;flex-shrink:0}
.who b{font-size:15px;font-weight:800;display:block;line-height:1.2}
.who span{display:block;font-size:12px;color:var(--grey);font-weight:600;margin-top:1px}
.field{margin-bottom:14px}
.field:last-child{margin-bottom:0}
.field label{display:flex;align-items:baseline;gap:8px;font-size:14px;font-weight:800;letter-spacing:-.01em;margin-bottom:7px}
.field label .opt-tag{font-size:12px;font-weight:600;color:#bbb;letter-spacing:0}
.field input,.field textarea{width:100%;font-family:inherit;font-size:15px;padding:12px 14px;border:1px solid var(--line);border-radius:12px;background:var(--soft);outline:none;transition:border .2s,box-shadow .2s,background .2s;color:var(--ink)}
.field textarea{resize:none;min-height:60px;line-height:1.4}
.field input::placeholder,.field textarea::placeholder{color:#bdbab2}
.field input:focus,.field textarea:focus{border-color:var(--orange);box-shadow:0 0 0 3px rgba(248,80,0,.12);background:#fff}
.field.err input,.field.err textarea{border-color:#ff1a00;box-shadow:0 0 0 2px rgba(255,26,0,.4)}
.field.err .opts{box-shadow:0 0 0 2px rgba(255,26,0,.4);border-radius:13px}
.opts{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:9px}
.opt{border:1.5px solid var(--line);border-radius:12px;padding:12px 14px;font-size:14px;font-weight:700;cursor:pointer;background:var(--soft);transition:.18s;font-family:inherit;text-align:left;color:var(--ink);display:flex;align-items:center;gap:10px}
.opt:hover{border-color:var(--orange)}
.opt.sel{background:var(--grad);color:#fff;border-color:transparent;box-shadow:0 8px 18px rgba(248,80,0,.28)}
.opt .dot{width:17px;height:17px;border-radius:50%;border:2px solid var(--line);flex-shrink:0;transition:.18s}
.opt.sel .dot{border-color:#fff;background:radial-gradient(circle at center,#fff 0 34%,transparent 38%)}
.actions{display:flex;justify-content:space-between;align-items:center;margin-top:18px}

/* done */
.done{text-align:center;max-width:600px;margin:24px auto 0;animation:fin .55s ease}
.done__ic{width:84px;height:84px;border-radius:50%;background:var(--grad);display:grid;place-items:center;margin:0 auto 24px;box-shadow:0 18px 44px rgba(248,80,0,.38)}
.done h2{font-size:clamp(30px,4.6vw,46px);font-weight:900;letter-spacing:-.035em;line-height:1.04;margin-bottom:14px}
.done p{color:var(--grey);font-size:16px;line-height:1.55}
.done .recap-mini{display:inline-flex;align-items:center;gap:10px;margin-top:22px;background:#fff;border:1px solid var(--line);border-radius:100px;padding:9px 18px;font-size:14px;font-weight:700;box-shadow:0 6px 18px rgba(0,0,0,.05)}
.done .recap-mini b{color:var(--orange)}
/* order confirmation card */
.oc-card{margin:26px auto 0;max-width:520px;text-align:left;background:#fff;border:1px solid var(--line);border-radius:18px;overflow:hidden;box-shadow:0 14px 40px rgba(0,0,0,.06)}
.oc-head{display:flex;align-items:center;gap:13px;padding:16px 20px;border-bottom:1px solid var(--line)}
.oc-head img{width:46px;height:46px;border-radius:50%;object-fit:cover;border:2px solid #fff;box-shadow:0 4px 10px rgba(0,0,0,.12)}
.oc-head .ph{width:46px;height:46px;border-radius:50%;background:var(--grad);display:grid;place-items:center;color:#fff;font-weight:900;font-size:18px;flex-shrink:0}
.oc-head .who-t b{font-size:16px;font-weight:800;display:block;line-height:1.2}
.oc-head .who-t span{font-size:13px;color:var(--grey)}
.oc-badge{margin-left:auto;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;background:var(--grad);color:#fff;padding:5px 11px;border-radius:100px;flex-shrink:0}
.oc-row{display:flex;justify-content:space-between;align-items:baseline;padding:10px 20px;font-size:14px}
.oc-row span{color:var(--grey)}.oc-row b{font-weight:700}
.oc-total{display:flex;justify-content:space-between;align-items:baseline;padding:14px 20px;border-top:1px solid var(--line)}
.oc-total span{font-size:13px;color:var(--grey)}
.oc-total b{font-size:24px;font-weight:900;letter-spacing:-.02em}
.oc-next{margin:22px auto 0;max-width:520px;text-align:left}
.oc-next h3{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--orange);margin-bottom:12px}
.oc-step{display:flex;gap:12px;align-items:flex-start;margin-bottom:11px;font-size:14px;color:#333;line-height:1.4}
.oc-step .n{width:23px;height:23px;border-radius:7px;background:var(--soft);border:1px solid var(--line);display:grid;place-items:center;font-weight:800;font-size:11px;flex-shrink:0}

@media(max-width:560px){.slabel{display:none}.sline{width:26px;margin:0 7px}.card{padding:20px}}
</style>
</head>

<div class="prog"><div class="prog__bar" id="bar"></div></div>
<div class="glow"></div>

<header class="top">
  <a href="index.html" aria-label="Brasero home"><svg class="logo-svg" viewBox="0 0 798 189" fill="none"><use href="#brasero-mark"/></svg></a>
  <span class="stepcount" id="stepcount"></span>
</header>

<main class="shell">
  <div class="stepper" id="stepper"></div>
  <div id="view"></div>
</main>

<script>
/* Set API to your backend URL to send onboarding answers for real.
   Leave empty for the demo (answers are logged + kept in sessionStorage). */
/* localhost → local Express backend ; otherwise same-origin Vercel /api functions. */
const API=(location.hostname==='localhost'||location.hostname==='127.0.0.1')?'http://localhost:4242':'';
const STEPS=[
  {tag:'Step 1 · Your page',short:'Your page',title:['Let’s set up your ','page','.'],
    sub:'We pulled in your Instagram — just confirm and fill the rest.',
    fields:[
      {key:'page',label:'Page / brand name',type:'text',placeholder:'e.g. Wealth Notes',required:true},
      {key:'handle',label:'Handle & platform',type:'text',placeholder:'@yourpage · Instagram',required:true},
      {key:'niche',label:'What is your page about?',type:'textarea',placeholder:'Your niche, topics and angle…',required:true},
      {key:'audience',label:'Who are you talking to?',type:'textarea',placeholder:'Your ideal follower: age, stage, what they want…',required:true},
    ]},
  {tag:'Step 2 · Your goals',short:'Goals',title:['What does ','winning',' look like?'],
    sub:'So every deck pushes the metric that actually matters to you.',
    fields:[
      {key:'goal',label:'Your #1 goal right now',type:'choice',options:['Reach & virality','Saves & shares','Followers growth','Sales / leads'],required:true},
      {key:'freq',label:'How often do you want to post?',type:'choice',options:['1–2 / week','3–4 / week','Daily'],required:true},
      {key:'challenge',label:'Biggest content challenge today?',type:'textarea',placeholder:'Running out of ideas, low saves, inconsistent look…',required:false},
    ]},
  {tag:'Step 3 · Your brand',short:'Brand',title:['Make it ','unmistakably',' yours.'],
    sub:'The look, the feel, the references — the more you share, the sharper your decks.',
    fields:[
      {key:'style',label:'Describe your brand vibe',type:'textarea',placeholder:'Bold, high-contrast, warm orange accents, big type…',required:false},
      {key:'inspo',label:'Accounts or posts you love',type:'textarea',placeholder:'Paste 1–3 links for inspiration…',required:false},
      {key:'notes',label:'Anything else we should know?',type:'textarea',placeholder:'Tell us anything…',required:false},
    ]},
];

const order=JSON.parse(sessionStorage.getItem('brasero_order')||'{}');
const ans={};
/* prefill the handle from the Instagram info imported at checkout */
if(order.handle) ans.handle=order.handle+' · Instagram';
let step=0;
const view=document.getElementById('view'),bar=document.getElementById('bar'),
      stepper=document.getElementById('stepper'),stepcount=document.getElementById('stepcount');
const esc=s=>(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');

function renderStepper(){
  let h='';
  STEPS.forEach((s,k)=>{
    const cls=k<step?'done':(k===step?'active':'');
    h+=`<div class="snode ${cls}"><div class="snum">${k+1}</div><span class="slabel">${s.short}</span></div>`;
    if(k<STEPS.length-1) h+=`<div class="sline ${k<step?'fill':''}"></div>`;
  });
  stepper.innerHTML=h;
  bar.style.width=(step/STEPS.length*100)+'%';
  stepcount.textContent=`Step ${step+1} of ${STEPS.length}`;
}

function whoHTML(){
  if(step!==0 || (!order.photo && !order.handle)) return '';
  const av=order.photo?`<img src="${order.photo}" alt="">`:`<span class="ph">${(order.handle||'B').replace(/^@/,'').charAt(0).toUpperCase()}</span>`;
  return `<div class="who">${av}<div><b>${esc(order.handle||'Your account')}</b><span>Imported from Instagram</span></div></div>`;
}

function fieldHTML(f){
  const v=ans[f.key]||'';
  const optTag=f.required?'':'<span class="opt-tag">optional</span>';
  let inner;
  if(f.type==='textarea') inner=`<textarea data-k="${f.key}" placeholder="${esc(f.placeholder)}">${esc(v)}</textarea>`;
  else if(f.type==='choice')
    inner=`<div class="opts" data-k="${f.key}">${f.options.map(o=>`<button type="button" class="opt ${v===o?'sel':''}" data-v="${esc(o)}"><span class="dot"></span>${o}</button>`).join('')}</div>`;
  else inner=`<input data-k="${f.key}" type="text" value="${esc(v)}" placeholder="${esc(f.placeholder)}" autocomplete="off">`;
  return `<div class="field" data-field="${f.key}"><label>${f.label}${optTag}</label>${inner}</div>`;
}

function render(){
  renderStepper();
  const s=STEPS[step],last=step===STEPS.length-1;
  view.innerHTML=`
    <div class="intro">
      <span class="eyebrow"><span class="pxa"><i></i><i></i><i></i></span>${s.tag}</span>
      <h1 class="title">${s.title[0]}<span class="grad-text">${s.title[1]}</span>${s.title[2]}</h1>
      <p>${s.sub}</p>
    </div>
    <div class="card">${whoHTML()}${s.fields.map(fieldHTML).join('')}</div>
    <div class="actions">
      ${step>0?'<button class="btn btn--ghost" id="back">← Back</button>':'<a class="btn btn--ghost" href="index.html">← Cancel</a>'}
      <button class="btn btn--grad" id="next">${last?'Submit ✓':'Continue →'}</button>
    </div>`;

  view.querySelectorAll('.opts').forEach(grp=>{
    grp.querySelectorAll('.opt').forEach(o=>o.addEventListener('click',()=>{
      ans[grp.dataset.k]=o.dataset.v;
      grp.querySelectorAll('.opt').forEach(x=>x.classList.remove('sel'));
      o.classList.add('sel');grp.closest('.field').classList.remove('err');
    }));
  });
  view.querySelectorAll('input,textarea').forEach(el=>el.addEventListener('input',()=>el.closest('.field').classList.remove('err')));
  const nb=document.getElementById('next');nb&&nb.addEventListener('click',next);
  const bb=document.getElementById('back');bb&&bb.addEventListener('click',back);
  const first=view.querySelector('input,textarea');first&&first.focus();
}

function collect(){view.querySelectorAll('input,textarea').forEach(el=>{ans[el.dataset.k]=el.value.trim();});}
function validate(){
  collect();let ok=true,firstErr=null;
  STEPS[step].fields.forEach(f=>{
    if(!f.required) return;
    if(!ans[f.key]){ok=false;const fl=view.querySelector(`.field[data-field="${f.key}"]`);if(fl){fl.classList.add('err');if(!firstErr)firstErr=fl;}}
  });
  if(firstErr){const t=firstErr.querySelector('input,textarea');t?t.focus():firstErr.scrollIntoView({behavior:'smooth',block:'center'});}
  return ok;
}
function next(){if(!validate())return;if(step<STEPS.length-1){step++;render();}else submit();}
function back(){collect();if(step>0){step--;render();}}

function submit(){
  bar.style.width='100%';stepcount.textContent='';
  const sid=new URLSearchParams(location.search).get('session_id')||'';
  const payload={order,answers:ans,sessionId:sid,submittedAt:new Date().toISOString()};
  sessionStorage.setItem('brasero_onboarding',JSON.stringify(payload));
  if(API!==null){ fetch(API+'/api/onboarding',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)}).catch(console.error); }
  else { console.log('Onboarding submitted →',payload); }
  const first=order.name?(', '+order.name.split(' ')[0]):'';
  stepper.innerHTML='';
  const sub=order.billing==='sub';
  const ref=sid?sid.slice(-8).toUpperCase():'';
  const av=order.photo?`<img src="${esc(order.photo)}" alt="">`:`<span class="ph">${(order.handle||'B').replace(/^@/,'').charAt(0).toUpperCase()}</span>`;
  const amount=order.price!=null?('$'+order.price+(sub?' / mo':'')):'';
  view.innerHTML=`<div class="done">
    <div class="done__ic"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg></div>
    <h2>Order confirmed${first}! 🎉</h2>
    <p>Payment received and your brief is in. Here's a recap${order.email?` — a copy goes to <b>${esc(order.email)}</b>`:''}.</p>

    <div class="oc-card">
      <div class="oc-head">
        ${av}
        <div class="who-t"><b>${esc(order.handle||order.name||'Your account')}</b><span>${esc(order.name||'')}</span></div>
        ${order.planName?`<span class="oc-badge">${esc(order.planName)}</span>`:''}
      </div>
      ${amount?`<div class="oc-row"><span>Billing</span><b>${sub?'Subscription · monthly':'One-time payment'}</b></div>`:''}
      ${order.email?`<div class="oc-row"><span>Email</span><b>${esc(order.email)}</b></div>`:''}
      ${ref?`<div class="oc-row"><span>Order ref</span><b>#${ref}</b></div>`:''}
      ${amount?`<div class="oc-total"><span>Total paid</span><b>${amount}</b></div>`:''}
    </div>

    <div class="oc-next">
      <h3>What happens next</h3>
      <div class="oc-step"><span class="n">1</span><div>We review your brief & Instagram, then map your hooks and strategy.</div></div>
      <div class="oc-step"><span class="n">2</span><div>We write &amp; design your first decks in your brand style.</div></div>
      <div class="oc-step"><span class="n">3</span><div>You receive your post-ready decks by email${order.email?` at <b>${esc(order.email)}</b>`:''}.</div></div>
    </div>

    <div style="margin-top:28px"><a href="index.html" class="btn btn--grad">Back to home</a></div>
  </div>`;
  window.scrollTo({top:0,behavior:'smooth'});
}

render();
</script>
</body>
</html>
