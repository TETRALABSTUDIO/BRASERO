<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Talent panel · Brasero</title>
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
<link rel="preconnect" href="https://api.fontshare.com">
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap" rel="stylesheet">
<style>
:root{--ink:#111;--soft:#f7f4ef;--grey:#6b6b6b;--line:rgba(0,0,0,.10);--orange:#f87000;--grad:linear-gradient(100deg,#ff1a00,#f87000);--ok:#15803d;--okbg:rgba(22,163,74,.12);--wait:#b45309;--waitbg:rgba(245,158,11,.13);
--c-todo:#dc2626;--c-prog:#2563eb;--c-done:#16a34a;}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Satoshi',system-ui,sans-serif;background:#f4f1ec;color:var(--ink);-webkit-font-smoothing:antialiased}
input,textarea,button,select{font-family:inherit}
input,textarea,select{padding:10px 12px;border:1px solid var(--line);border-radius:10px;background:#fff;outline:none;width:100%;font-size:14px}
textarea{min-height:120px;resize:vertical;line-height:1.55}
input:focus,textarea:focus,select:focus{border-color:var(--orange);box-shadow:0 0 0 3px rgba(248,80,0,.10)}
button{cursor:pointer;border:1px solid transparent;border-radius:100px;font-weight:700;font-size:13.5px;padding:9px 16px;transition:transform .15s,box-shadow .15s,opacity .15s}
button:hover{transform:translateY(-1px)}
button[disabled]{opacity:.45;pointer-events:none;transform:none}
.b-grad{background:var(--grad);color:#fff;box-shadow:0 8px 20px rgba(248,80,0,.26)}
.b-ghost{background:#fff;border-color:var(--line);color:var(--ink)}
.b-del{background:#fff;border-color:#f0caca;color:#c33}
.b-sm{padding:6px 12px;font-size:12.5px}
.grad-text{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
.field{margin-bottom:12px}.field label{font-size:12px;font-weight:700;display:block;margin-bottom:5px}

/* auth */
.authwrap{max-width:390px;margin:13vh auto;background:#fff;border:1px solid var(--line);border-radius:20px;padding:32px;box-shadow:0 18px 50px rgba(0,0,0,.08)}
.authwrap .logo{height:30px;margin-bottom:16px;color:var(--ink)}
.authwrap p{color:var(--grey);font-size:13.5px;margin-bottom:20px}
.setupav{display:grid;place-items:center;cursor:pointer;margin:0 auto 16px;width:76px;height:76px;border-radius:50%;background:var(--soft);border:2px dashed var(--line);overflow:hidden}
.setupav:hover{border-color:var(--orange)}
.setupav #setupAvatar,.setupav img{width:100%;height:100%;display:block}
.setupav img{object-fit:cover}
.setupav .ph{display:grid;place-items:center;width:100%;height:100%;color:var(--grey);font-size:11px;font-weight:800}
.err{color:#c33;font-size:13px;font-weight:600;margin-top:10px;min-height:16px}

/* layout */
.app{min-height:100vh}
/* top nav */
.topnav{border-bottom:1px solid var(--line);background:#fff;position:sticky;top:0;z-index:20}
.topnav__in{max-width:1180px;margin:0 auto;padding:14px 30px;display:flex;align-items:center;gap:24px}
.topnav .logo{height:24px;color:var(--ink)}
.topnav .tabs{margin-left:auto}
.topnav .tabs button{flex:0 0 auto;padding:8px 18px}
/* fixed profile pill (bottom-left) */
.ppill{position:fixed;left:18px;bottom:18px;z-index:40;display:flex;align-items:center;gap:11px;background:#fff;border:1px solid var(--line);border-radius:100px;padding:7px 12px 7px 7px;box-shadow:0 14px 34px rgba(0,0,0,.14)}
.ppill .avwrap{flex-shrink:0}
.ppill .avatar.lg,.ppill .avatar.sm,.ppill .avatar{width:40px;height:40px;font-size:15px;border-width:2px;box-shadow:0 5px 12px rgba(248,80,0,.24)}
.ppill .avwrap .cam{width:19px;height:19px;right:-2px;bottom:-2px}
.ppill .avwrap .cam svg{width:10px;height:10px}
.ppill__info{display:flex;flex-direction:column;gap:3px;min-width:0}
.ppill .nmrow{display:flex;align-items:center;gap:5px}
.ppill .nm{font-size:14px;font-weight:900;letter-spacing:-.02em;line-height:1;white-space:nowrap}
.ppill .pen{cursor:pointer;opacity:.4;display:inline-flex}.ppill .pen:hover{opacity:1}
.ppill .rolebadge{align-self:flex-start;font-size:9px;padding:2px 8px}
.ppill #logout{margin-left:4px;flex-shrink:0}
#whoEmail{display:none}
.side{background:#fff;border-right:1px solid var(--line);padding:18px 16px;display:flex;flex-direction:column;gap:18px;position:sticky;top:0;height:100vh;overflow:auto}
.brand{display:flex;align-items:center;justify-content:space-between}
.brand .logo{height:24px;color:var(--ink)}

/* avatar */
.avatar{border-radius:50%;flex-shrink:0;border:3px solid #fff;box-shadow:0 8px 20px rgba(248,80,0,.26);display:block}
img.avatar{object-fit:cover}
div.avatar{display:grid;place-items:center;color:#fff;font-weight:900;background:var(--grad)}
.avatar.lg{width:78px;height:78px;font-size:28px}
.avatar.sm{width:50px;height:50px;font-size:18px;border-width:2px;box-shadow:0 6px 14px rgba(248,80,0,.22)}
.avwrap{position:relative;cursor:pointer}
.avwrap .cam{position:absolute;right:-2px;bottom:-2px;width:26px;height:26px;border-radius:50%;background:#fff;border:1px solid var(--line);display:grid;place-items:center;box-shadow:0 4px 10px rgba(0,0,0,.12)}
.avwrap .cam svg{width:14px;height:14px}

.profile{display:flex;flex-direction:column;align-items:center;text-align:center;gap:8px;padding:18px 12px;background:linear-gradient(180deg,var(--soft),#fff);border:1px solid var(--line);border-radius:18px}
.profile .nmrow{display:flex;align-items:center;gap:6px}
.profile .nm{font-size:19px;font-weight:900;letter-spacing:-.02em;line-height:1.1}
.profile .pen{cursor:pointer;opacity:.45}.profile .pen:hover{opacity:1}
.profile .em{font-size:12.5px;color:var(--grey);word-break:break-all}
.rolebadge{font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;padding:3px 10px;border-radius:100px}
.rolebadge.owner{color:#fff;background:var(--grad)}
.rolebadge.talent{color:var(--c-prog);background:rgba(37,99,235,.10)}

.tabs{display:flex;gap:6px}
.tabs button{flex:1;background:#fff;border:1px solid var(--line);color:var(--grey)}
.tabs button.on{background:linear-gradient(100deg,rgba(255,26,0,.08),rgba(248,80,0,.10));border-color:transparent;box-shadow:inset 0 0 0 1.5px var(--orange);color:var(--ink)}
.side .hint{font-size:12px;color:var(--grey);text-align:center;margin-top:auto;line-height:1.4}

.main{padding:24px 30px 90px;max-width:1180px;margin:0 auto}
.toolbar{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;margin-bottom:26px}
.toolbar h2{font-size:25px;font-weight:900;letter-spacing:-.035em}
.toolbar .right{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.search{position:relative;min-width:230px}
.search input{padding-left:36px}
.search svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);opacity:.4}
.vswitch{display:flex;gap:4px;background:#fff;border:1px solid var(--line);border-radius:100px;padding:4px}
.vswitch button{padding:7px 14px;font-size:12.5px;color:var(--grey);background:transparent;border-radius:100px}
.vswitch button.on{background:var(--grad);color:#fff}
.placeholder{display:grid;place-items:center;height:60vh;color:var(--grey);text-align:center}

/* projects */
.kanban{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;align-items:start}
.kcol{background:#fff;border:1px solid var(--line);border-radius:16px;padding:12px;min-height:120px}
.kcol__h{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;margin:4px 6px 12px}
.kcol__h .dot{width:9px;height:9px;border-radius:50%}.kcol__h .c{margin-left:auto;color:var(--grey)}
.kcol .pcard{margin-bottom:10px}
.plist{display:flex;flex-direction:column;gap:8px}
.pcard{text-align:left;width:100%;background:#fff;border:1px solid var(--line);border-radius:15px;padding:15px 16px;cursor:pointer;transition:.15s;display:block}
.pcard:hover{border-color:rgba(248,80,0,.5);box-shadow:0 10px 26px rgba(0,0,0,.07);transform:translateY(-1px)}
.pcard .r{font-weight:900;font-size:15px;letter-spacing:-.02em}
.pcard .n{font-size:13px;color:var(--grey);margin-top:2px}
.pcard .foot{display:flex;align-items:center;justify-content:space-between;margin-top:12px}
.pcard .plan{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.03em;color:var(--grey)}
.prow{display:flex;align-items:center;gap:14px;background:#fff;border:1px solid var(--line);border-radius:13px;padding:12px 16px;cursor:pointer;transition:.15s;text-align:left;width:100%}
.prow:hover{border-color:rgba(248,80,0,.5)}
.prow .r{font-weight:900;min-width:90px}.prow .n{flex:1;color:var(--grey);font-size:13.5px}.prow .plan{font-size:11px;font-weight:800;text-transform:uppercase;color:var(--grey)}
.spill{font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.03em;padding:4px 10px;border-radius:100px;white-space:nowrap}
.spill.progress{background:rgba(37,99,235,.10);color:var(--c-prog)}.spill.done{background:rgba(22,163,74,.11);color:var(--c-done)}.spill.todo{background:rgba(220,38,38,.10);color:var(--c-todo)}

/* detail */
.back{display:inline-flex;align-items:center;gap:6px;font-weight:700;font-size:13px;color:var(--grey);background:#fff;border:1px solid var(--line)}
.ohead{display:flex;flex-wrap:wrap;align-items:flex-start;justify-content:space-between;gap:14px;margin:4px 0 14px}
.ohead h2{font-size:24px;font-weight:900;letter-spacing:-.035em}.ohead .meta{color:var(--grey);font-size:14px;margin-top:3px}
.ohead .right{display:flex;flex-direction:column;align-items:flex-end;gap:8px}

/* decks */
#decks.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:16px;align-items:start}
#decks.list{display:flex;flex-direction:column;gap:16px;max-width:720px}
.deck{background:#fff;border:1px solid var(--line);border-radius:18px;padding:18px 20px;box-shadow:0 10px 30px rgba(0,0,0,.05)}
.deck__top{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.deck__top input{font-weight:800;font-size:16px;border-color:transparent;background:transparent;padding:6px 8px}
.deck__top input:hover{background:var(--soft)}
.pill{font-size:11px;font-weight:800;letter-spacing:.02em;padding:5px 10px;border-radius:100px;white-space:nowrap}
.pill--wait{background:var(--waitbg);color:var(--wait)}.pill--act{background:rgba(248,80,0,.12);color:#c64600}.pill--done{background:var(--okbg);color:var(--ok)}
.stage{border:1px solid var(--line);border-radius:14px;padding:15px;margin-top:12px;background:#fff}
.stage.locked{background:var(--soft);opacity:.85}.stage.approved{border-color:rgba(22,163,74,.35);background:rgba(22,163,74,.04)}
.stage__h{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--grey);margin-bottom:10px}
.stage__h .num{width:20px;height:20px;border-radius:50%;display:grid;place-items:center;font-size:11px;color:#fff;background:var(--grad)}
.stage.locked .stage__h .num{background:#cbcbcb}.stage.approved .stage__h .num{background:var(--ok)}
.lockmsg{color:var(--grey);font-size:13px}
.note{font-size:13px;color:#c64600;background:rgba(248,80,0,.08);border-radius:10px;padding:10px 12px;margin-bottom:12px}
.statusline{font-size:12.5px;font-weight:700;margin-bottom:10px;display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border-radius:100px}
.statusline.wait{background:var(--waitbg);color:var(--wait)}.statusline.ok{background:var(--okbg);color:var(--ok)}
.scriptview{background:var(--soft);border-radius:10px;padding:12px;font-size:13.5px;line-height:1.55;white-space:pre-wrap;color:#444;max-height:120px;overflow:auto}
.imgs{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.thumb{position:relative;width:74px;height:74px;border-radius:10px;overflow:hidden;border:1px solid var(--line)}
.thumb img{width:100%;height:100%;object-fit:cover;display:block}
.thumb .x{position:absolute;top:3px;right:3px;width:20px;height:20px;border-radius:50%;background:rgba(0,0,0,.62);color:#fff;border:none;font-size:12px;display:grid;place-items:center;padding:0;line-height:1}
.thumb .x:hover{background:#c33}
.adder{width:74px;height:74px;border-radius:10px;border:1.5px dashed var(--line);background:var(--soft);display:grid;place-items:center;cursor:pointer;color:var(--grey);font-size:11px;font-weight:700;text-align:center;line-height:1.2}
.adder:hover{border-color:var(--orange);color:var(--orange)}
.imgcount{font-size:11.5px;color:var(--grey);font-weight:700;margin-bottom:8px}
.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}

/* project board (master / detail), like the client tracker */
.board{display:grid;grid-template-columns:300px 1fr;align-items:stretch;background:#fff;border:1px solid var(--line);border-radius:18px;box-shadow:0 10px 30px rgba(0,0,0,.05);overflow:hidden}
.board__list{background:var(--soft);border-right:1px solid var(--line)}
.board__list-head{padding:16px 16px 12px}
.board__list-head button{width:100%}
#deckList{border-top:1px solid var(--line)}
.deckitem{width:100%;text-align:left;background:transparent;border:none;border-bottom:1px solid var(--line);border-radius:0;padding:14px 16px;cursor:pointer;display:flex;flex-direction:column;gap:10px;transition:background .15s}
.deckitem:hover{background:rgba(255,255,255,.6);transform:none;box-shadow:none}
.deckitem.sel{background:#fff;box-shadow:inset 3px 0 0 var(--orange)}
.deckitem__top{display:flex;align-items:center;min-width:0}
.deckitem__title{font-size:14px;font-weight:900;letter-spacing:-.02em;line-height:1.2;display:flex;align-items:center;gap:8px;min-width:0}
.deckitem__title>span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ti{width:17px;height:17px;flex-shrink:0;display:block}
.miniprog{height:6px;border-radius:100px;background:rgba(0,0,0,.08);overflow:hidden}
.miniprog i{display:block;height:100%;background:var(--grad);border-radius:100px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.deckitem__pill{align-self:flex-start}
.board__right{display:flex;flex-direction:column;min-height:74vh}
.board__detail{flex:1 1 auto;padding:22px 24px;min-width:0}
.board__detail .deck{border:none;box-shadow:none;padding:0;border-radius:0}
.empty{display:grid;place-items:center;min-height:50vh;color:var(--grey);text-align:center;font-size:14px;padding:20px}
@media(max-width:820px){.board{grid-template-columns:1fr}.board__list{border-right:none;border-bottom:1px solid var(--line)}.board__right{min-height:0}}
/* deadline badge */
.dl{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:800;padding:4px 9px;border-radius:100px;background:rgba(0,0,0,.05);color:#555;white-space:nowrap}
.dl.soon{background:var(--waitbg);color:var(--wait)}
.dl.late{background:rgba(220,38,38,.12);color:#c0291f}
.dlrow{margin-top:9px}

/* right detail, same design as the client tracker */
.detail__head{display:flex;align-items:center;gap:10px;margin-bottom:2px}
.detail__titleinput{font-size:21px;font-weight:900;letter-spacing:-.03em;line-height:1.1;border:none;background:transparent;padding:5px 7px;flex:1;min-width:0}
.detail__titleinput:hover{background:var(--soft)}
.detail__instr{font-size:14.5px;color:var(--ink);line-height:1.55;margin:8px 0 16px;max-width:64ch}
.detail__instr b{color:var(--orange)}
.note-line{font-size:14px;color:var(--ink);line-height:1.55;margin:0 0 12px}
.note-line b{color:var(--orange)}
.board__detail textarea{width:100%;min-height:180px}
.tscript{margin-top:14px}
.tscript summary{cursor:pointer;font-weight:700;font-size:12.5px;color:var(--grey)}
.board__detail .imgcount{font-size:11.5px;color:var(--grey);font-weight:700;margin-top:14px}
.board__detail .gal{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:11px;margin-top:10px}
.board__detail .gal figure{position:relative;aspect-ratio:1080/1350;border-radius:10px;overflow:hidden;border:1px solid var(--line)}
.board__detail .gal figure img{width:100%;height:100%;object-fit:cover;display:block}
.board__detail .gal .x{position:absolute;top:5px;right:5px;width:22px;height:22px;border-radius:50%;background:rgba(0,0,0,.6);color:#fff;border:none;font-size:12px;display:grid;place-items:center;padding:0;line-height:1;cursor:pointer}
.board__detail .gal .x:hover{background:#c33}
.board__detail .gal .adder{aspect-ratio:1080/1350;border-radius:10px;border:1.5px dashed var(--line);background:var(--soft);display:grid;place-items:center;cursor:pointer;color:var(--grey);font-size:12px;font-weight:700;text-align:center;line-height:1.2}
.board__detail .gal .adder:hover{border-color:var(--orange);color:var(--orange)}
/* command bar (talent actions + progress) at the bottom edge */
.cmdbar{border-top:1px solid var(--line);background:var(--soft)}
.cmdbar:empty{display:none}
.cmdbar__row{display:flex;align-items:center;gap:12px;flex-wrap:wrap;padding:14px 24px}
.cmdbar__meta{display:flex;align-items:center;gap:12px;margin-right:auto}
.cmdbar__hint{font-size:12.5px;color:var(--grey);font-weight:600}
.foot-count{font-size:12.5px;color:var(--grey);font-weight:700}
.cmdprog{height:8px;background:rgba(0,0,0,.08);overflow:hidden}
.cmdprog i{display:block;height:100%;background:var(--grad);transition:width .6s cubic-bezier(.4,0,.2,1)}

/* team */
.tgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:16px}
.tcard{background:#fff;border:1px solid var(--line);border-radius:18px;padding:18px;box-shadow:0 10px 30px rgba(0,0,0,.05);display:flex;flex-direction:column;gap:14px}
.tcard__top{display:flex;align-items:center;gap:13px}
.tcard .nm{font-weight:900;font-size:16px;letter-spacing:-.02em}
.tcard .em{font-size:12.5px;color:var(--grey);word-break:break-all}
.tcard__mid{display:flex;align-items:center;gap:16px}
.donut{width:84px;height:84px;flex:0 0 84px;aspect-ratio:1;border-radius:50%;display:grid;place-items:center}
.donut.empty{background:#eee}
.donut .hole{width:58px;height:58px;border-radius:50%;background:#fff;display:grid;place-items:center;text-align:center}
.donut .hole b{font-size:20px;font-weight:900;line-height:1}
.donut .hole span{font-size:8px;color:var(--grey);text-transform:uppercase;letter-spacing:.03em;margin-top:1px}
.legend{display:flex;flex-direction:column;gap:5px;font-size:12.5px;font-weight:600}
.legend i{display:inline-block;width:9px;height:9px;border-radius:3px;margin-right:7px;vertical-align:0}
.sec{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;color:var(--grey);margin-bottom:7px}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{display:inline-flex;align-items:center;gap:6px;background:var(--soft);border:1px solid var(--line);border-radius:100px;padding:4px 6px 4px 11px;font-size:12px;font-weight:700}
.chip button{width:18px;height:18px;border-radius:50%;background:rgba(0,0,0,.5);color:#fff;border:none;font-size:11px;display:grid;place-items:center;padding:0;line-height:1}
.chip button:hover{background:#c33}
.tcard .none{font-size:12.5px;color:var(--grey)}
.addcard{background:#fff;border:1px solid var(--line);border-radius:18px;padding:20px;box-shadow:0 10px 30px rgba(0,0,0,.05);margin-bottom:18px}
.addcard h3{font-size:16px;font-weight:900;letter-spacing:-.02em;margin-bottom:14px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}

.hide{display:none}
.modal{position:fixed;inset:0;background:rgba(12,12,12,.55);display:grid;place-items:center;z-index:60;padding:20px}
.modal.hide{display:none}
.modalc{background:#fff;border-radius:20px;width:100%;max-width:540px;padding:26px 26px 24px;box-shadow:0 30px 80px rgba(0,0,0,.32);max-height:90vh;overflow:auto}
.modalc__h{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.modalc__h h3{font-size:19px;font-weight:900;letter-spacing:-.03em}
.mx{width:auto;background:none;border:none;font-size:17px;color:var(--grey);cursor:pointer;padding:4px 6px}
.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;vertical-align:-2px}
@keyframes sp{to{transform:rotate(360deg)}}
@media(max-width:820px){.topnav__in{padding:12px 18px}.main{padding:20px 18px 90px}.kanban{grid-template-columns:1fr}.grid2{grid-template-columns:1fr}}
</style>
</head>
<body>

<!-- brasero wordmark -->

<linearGradient id="g_mark" x1="16" y1="56" x2="163" y2="141" gradientUnits="userSpaceOnUse"><stop stop-color="#FF0000"/><stop offset="1" stop-color="#F87000"/></linearGradient>

<!-- ===== AUTH ===== -->
<div id="auth" class="authwrap">
  <svg class="logo" viewBox="0 0 798 189" fill="none"><use href="#brasero-mark"/></svg>
  <div id="authLogin">
    <p>Sign in to manage your projects.</p>
    <form id="loginForm">
      <div class="field"><label>Email</label><input id="email" type="email" placeholder="you@brasero.studio" autocomplete="username" required></div>
      <div class="field"><label>Password</label><input id="password" type="password" placeholder="••••••••" autocomplete="current-password" required></div>
      <button class="b-grad" id="login" style="width:100%" type="submit">Sign in</button>
    </form>
  </div>
  <div id="authSetup" class="hide">
    <p>Welcome to Brasero! Set up your account.</p>
    <form id="setupForm">
      <label class="setupav" title="Add a profile photo"><span id="setupAvatar"><span class="ph">+ Photo</span></span><input type="file" accept="image/*" hidden id="setupPhoto"></label>
      <div class="field"><label>Your name</label><input id="setupName" placeholder="Jane Doe"></div>
      <div class="field"><label>Create a password</label><input id="setupPass" type="password" placeholder="At least 6 characters" autocomplete="new-password" required></div>
      <button class="b-grad" id="setupBtn" style="width:100%" type="submit">Create my account →</button>
    </form>
  </div>
  <div class="err" id="authErr"></div>
</div>

<!-- ===== APP ===== -->
<div id="app" class="app hide">
  <header class="topnav">
    <div class="topnav__in">
      <svg class="logo" viewBox="0 0 798 189" fill="none"><use href="#brasero-mark"/></svg>
      <div class="tabs hide" id="tabs">
        <button class="on" data-tab="projects">Projects</button>
        <button data-tab="team">Team</button>
      </div>
    </div>
  </header>

  <main class="main">
    <div id="vProjects">
      <div id="overview">
        <div class="toolbar">
          <h2>Projects</h2>
          <div class="right">
            <button class="b-grad b-sm hide" id="newProject">+ New project</button>
            <div class="search"><svg width="15" height="15" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="#999" stroke-width="2"/><path d="M16.5 16.5L21 21" stroke="#999" stroke-width="2" stroke-linecap="round"/></svg><input id="search" placeholder="Search projects…"></div>
            <div class="vswitch" id="vswitch"><button data-v="kanban">Kanban</button><button data-v="list">List</button></div>
          </div>
        </div>
        <div id="projects"></div>
      </div>
      <div id="detail" class="hide">
        <div class="ohead">
          <div><h2 id="oName"></h2><div class="meta" id="oMeta"></div></div>
          <div class="right">
            <button class="back b-sm" id="back">← All projects</button>
            <span id="oDeadline"></span>
          </div>
        </div>
        <div class="board">
          <aside class="board__list">
            <div class="board__list-head"><button class="b-grad b-sm" id="addDeck">+ Add element</button></div>
            <div id="deckList"></div>
          </aside>
          <div class="board__right">
            <div class="board__detail" id="deckDetail"></div>
            <div class="cmdbar" id="deckCmd"></div>
          </div>
        </div>
      </div>
    </div>

    <div id="vTeam" class="hide">
      <div class="toolbar"><h2>Team &amp; assignments</h2></div>
      <div class="addcard">
        <h3>Invite a Talent</h3>
        <p style="font-size:13px;color:var(--grey);margin:-6px 0 14px">They'll get an email to set their own password, name &amp; photo.</p>
        <form id="talentForm">
          <div class="grid2">
            <div class="field"><label>Name (optional)</label><input id="tName" placeholder="Jane Doe"></div>
            <div class="field"><label>Email</label><input id="tEmail" type="email" placeholder="jane@brasero.studio" required></div>
          </div>
          <label style="display:flex;align-items:center;gap:7px;margin:0 0 14px"><input type="checkbox" id="tOwner" style="width:auto"> Make owner</label><br>
          <button class="b-grad" type="submit">Send invite →</button>
          <span class="err" id="tErr" style="display:inline-block;margin-left:10px"></span>
        </form>
      </div>
      <div class="tgrid" id="teamGrid"></div>
    </div>
  </main>

  <!-- fixed profile pill (bottom-left) -->
  <div class="ppill" id="profilePill">
    <label class="avwrap" title="Change photo">
      <span id="meAvatar"></span>
      <span class="cam"><svg viewBox="0 0 24 24" fill="none"><path d="M3 8h4l2-2h6l2 2h4v11H3z" stroke="#111" stroke-width="2" stroke-linejoin="round"/><circle cx="12" cy="13" r="3.2" stroke="#111" stroke-width="2"/></svg></span>
      <input type="file" accept="image/*" hidden id="mePhoto">
    </label>
    <div class="ppill__info">
      <div class="nmrow"><span class="nm" id="whoName"></span><span class="pen" id="editName" title="Edit name"><svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M4 20l4.5-1L20 7.5a2 2 0 0 0-2.8-2.8L6 16.5 5 20z" stroke="#111" stroke-width="2" stroke-linejoin="round"/></svg></span></div>
      <span class="rolebadge" id="roleBadge"></span>
    </div>
    <span id="whoEmail"></span>
    <button class="b-ghost b-sm" id="logout">Sign out</button>
  </div>

  <!-- New project modal (owner) -->
  <div class="modal hide" id="newModal">
    <div class="modalc">
      <div class="modalc__h"><h3>New project</h3><button type="button" class="mx" id="npClose">✕</button></div>
      <form id="npForm">
        <div class="grid2">
          <div class="field"><label>Client name</label><input id="npName" placeholder="Nina Park"></div>
          <div class="field"><label>Client email</label><input id="npEmail" type="email" placeholder="nina@brand.com" required></div>
        </div>
        <div class="grid2">
          <div class="field"><label>Instagram handle</label><input id="npIg" placeholder="@brand"></div>
          <div class="field"><label>Pack</label><select id="npPlan">
            <option value="starter">Ember · 3 decks</option>
            <option value="flame">Flame · 6 decks</option>
            <option value="burst" selected>Meteor · 9 + 1 decks</option>
          </select></div>
        </div>
        <div class="grid2">
          <div class="field"><label>Number of decks</label><input id="npDecks" type="number" min="0" max="50" value="10"></div>
          <div class="field"><label>Assign to talent (optional)</label><select id="npTalent"><option value="">Unassigned</option></select></div>
        </div>
        <div style="display:flex;align-items:center;gap:14px;margin-top:6px">
          <button class="b-grad" type="submit" id="npSubmit">Create project →</button>
          <span class="err" id="npErr" style="margin-top:0"></span>
        </div>
      </form>
    </div>
  </div>
</div>

<script>
const API=(location.hostname==='localhost'||location.hostname==='127.0.0.1')?'http://localhost:4242':'';
const $=s=>document.querySelector(s);
const esc=s=>(s||'').toString().replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const initials=s=>{const p=(s||'').trim().split(/[\s@.]+/).filter(Boolean);return ((p[0]||'?')[0]+(p[1]?p[1][0]:'')).toUpperCase();};
function avatar(t,size,extra){ return t.photo?`<img class="avatar ${size}" src="${esc(t.photo)}" ${extra||''}>`:`<div class="avatar ${size}" ${extra||''}>${esc(initials(t.name||t.email))}</div>`; }
const PLAN_NAMES={starter:'Ember',flame:'Flame',burst:'Meteor'};
const planName=p=>PLAN_NAMES[p]||p||'';
let TOKEN=localStorage.getItem('brasero_session')||'', ME=null, REF='', ORDERS=[], TALENTS=[];
const SETUP_TOKEN=new URLSearchParams(location.search).get('setup');
let SETUP_PHOTO='';
if(SETUP_TOKEN){ document.getElementById('authLogin').classList.add('hide'); document.getElementById('authSetup').classList.remove('hide'); }
let VIEW=localStorage.getItem('brasero_view')||'kanban'; if(VIEW==='grid') VIEW='kanban';
let DVIEW='cards';

async function api(path,body){
  const r=await fetch(API+path,{method:'POST',headers:{'Content-Type':'application/json',...(TOKEN?{'Authorization':'Bearer '+TOKEN}:{})},body:JSON.stringify(body)});
  if(r.status===401){ doLogout(); throw new Error('unauthorized'); }
  return r.json();
}

/* ---------- auth ---------- */
$('#loginForm').addEventListener('submit',async e=>{
  e.preventDefault(); $('#authErr').textContent='';
  const email=$('#email').value.trim(), password=$('#password').value;
  const btn=$('#login'); btn.disabled=true; btn.innerHTML='<span class="spin"></span>';
  try{
    const r=await fetch(API+'/api/auth',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'login',email,password})});
    const d=await r.json();
    if(!r.ok||!d.ok){ $('#authErr').textContent='Invalid email or password.'; return; }
    TOKEN=d.token; localStorage.setItem('brasero_session',TOKEN); boot();
  }catch(e){ $('#authErr').textContent='Network error.'; }
  finally{ btn.disabled=false; btn.textContent='Sign in'; }
});
function doLogout(){ localStorage.removeItem('brasero_session'); TOKEN=''; ME=null; location.reload(); }
$('#logout').onclick=doLogout;

/* first-login setup from an invite link */
$('#setupPhoto').addEventListener('change',async e=>{ const f=e.target.files[0]; if(!f) return; SETUP_PHOTO=await compress(f,512,0.85); $('#setupAvatar').innerHTML=`<img src="${SETUP_PHOTO}" alt="">`; e.target.value=''; });
$('#setupForm').addEventListener('submit',async e=>{
  e.preventDefault(); $('#authErr').textContent='';
  const name=$('#setupName').value.trim(), password=$('#setupPass').value;
  if(password.length<6){ $('#authErr').textContent='Password must be at least 6 characters.'; return; }
  const btn=$('#setupBtn'); btn.disabled=true; btn.innerHTML='<span class="spin"></span>';
  try{
    const r=await fetch(API+'/api/auth',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'setup',token:SETUP_TOKEN,name,password,photo:SETUP_PHOTO})});
    const d=await r.json();
    if(!r.ok||!d.ok){ $('#authErr').textContent=d.error==='invalid'?'This invite link is invalid or has expired.':(d.error==='weak'?'Password too short.':'Something went wrong.'); btn.disabled=false; btn.innerHTML='Create my account →'; return; }
    TOKEN=d.token; localStorage.setItem('brasero_session',TOKEN);
    history.replaceState(null,'','panel.html'); boot();
  }catch(e){ $('#authErr').textContent='Network error.'; btn.disabled=false; btn.innerHTML='Create my account →'; }
});

async function boot(){
  const d=await api('/api/admin',{action:'list'});
  if(!d.ok) return;
  ME=d.me; ORDERS=d.orders||[];
  $('#auth').classList.add('hide'); $('#app').classList.remove('hide');
  renderProfile();
  $('#tabs').classList.toggle('hide',!ME.is_owner);
  $('#newProject').classList.toggle('hide',!ME.is_owner);
  setView(VIEW); renderProjects();
}
function renderProfile(){
  $('#meAvatar').innerHTML=avatar(ME,'lg');
  $('#whoName').textContent=ME.name||ME.email.split('@')[0];
  $('#whoEmail').textContent=ME.email;
  const rb=$('#roleBadge'); rb.textContent=ME.is_owner?'Owner':'Talent'; rb.className='rolebadge '+(ME.is_owner?'owner':'talent');
}

/* ---------- profile self-edit ---------- */
$('#editName').onclick=async()=>{ const name=prompt('Your name', ME.name||''); if(name===null) return; const r=await api('/api/admin',{action:'update_me',name}); if(r.ok){ ME=r.me; renderProfile(); } };
$('#mePhoto').onchange=async e=>{ const f=e.target.files[0]; if(!f) return; const photo=await compress(f,512,0.8); const r=await api('/api/admin',{action:'update_me',photo}); if(r.ok){ ME=r.me; renderProfile(); } e.target.value=''; };

/* ---------- tabs ---------- */
document.querySelectorAll('.tabs button').forEach(b=>b.onclick=()=>{
  document.querySelectorAll('.tabs button').forEach(x=>x.classList.toggle('on',x===b));
  const team=b.dataset.tab==='team';
  $('#vTeam').classList.toggle('hide',!team);
  $('#vProjects').classList.toggle('hide',team);
  if(team) loadTeam();
});

/* ---------- projects overview ---------- */
const STATE={todo:['todo','To start','#dc2626'],progress:['progress','In progress','#2563eb'],done:['done','Completed','#16a34a']};
$('#search').oninput=renderProjects;
$('#vswitch').querySelectorAll('button').forEach(b=>b.onclick=()=>setView(b.dataset.v,true));
function setView(v,render){ VIEW=v; localStorage.setItem('brasero_view',v); $('#vswitch').querySelectorAll('button').forEach(b=>b.classList.toggle('on',b.dataset.v===v)); if(render) renderProjects(); }
function filtered(){ const q=$('#search').value.trim().toLowerCase(); return ORDERS.filter(o=>!q||(o.ref+' '+(o.name||'')+' '+(o.email||'')+' '+(o.plan||'')).toLowerCase().includes(q)); }
function spill(st){ const [c,l]=STATE[st]||STATE.todo; return `<span class="spill ${c}">${l}</span>`; }

/* type icons (orange gradient) + per-deck progress */
const TYPE_ICON={
  carousel:`<svg class="ti" viewBox="0 0 24 24" fill="none" stroke="url(#tgrad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="6" width="12" height="14" rx="2"/><path d="M18 8v10a2 2 0 0 1-2 2"/><path d="M21 10v6"/></svg>`,
  story:`<svg class="ti" viewBox="0 0 24 24" fill="none" stroke="url(#tgrad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6.5" y="3" width="11" height="18" rx="3"/><path d="M10 7h4"/></svg>`,
  branding:`<svg class="ti" viewBox="0 0 24 24" fill="none" stroke="url(#tgrad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="3.4"/><path d="M5.5 20a6.5 6.5 0 0 1 13 0"/></svg>`,
};
const DPCT={writing:12,script_review:34,designing:58,design_review:80,revision:72,done:100};
/* deadline scales with the number of production items, extra elements push it back */
const PLAN_BASE_H={starter:72,flame:72,burst:48}, PLAN_PACK={starter:3,flame:6,burst:10}, EXTRA_H_PER_ITEM=12;
function deadlineMs(o,items){
  const base=PLAN_BASE_H[o.plan]??72, pack=PLAN_PACK[o.plan]??0;
  const n=(items!=null?items:(o.items!=null?o.items:pack));
  const start=o.created_at?new Date(o.created_at).getTime():Date.now();
  return start + (base + Math.max(0,n-pack)*EXTRA_H_PER_ITEM)*3600000;
}
function dlBadge(o,items){
  const ms=deadlineMs(o,items)-Date.now(), late=ms<0, abs=Math.abs(ms);
  const h=Math.floor(abs/3600000), d=Math.floor(h/24), hr=h%24, t=d>0?`${d}d ${hr}h`:`${h}h`;
  return `<span class="dl ${late?'late':(h<24?'soon':'')}">⏱ ${late?'Overdue '+t:t+' left'}</span>`;
}

function pcard(o){ return `<button class="pcard" data-open="${esc(o.ref)}"><div class="r">#${esc(o.ref)}</div><div class="n">${esc(o.name||o.email||'')}</div><div class="dlrow">${dlBadge(o)}</div><div class="foot"><span class="plan">${esc(planName(o.plan))}</span>${spill(o.state)}</div></button>`; }
function renderProjects(){
  const list=filtered(), wrap=$('#projects');
  if(!list.length){ wrap.className=''; wrap.innerHTML='<div class="placeholder">No projects yet.</div>'; return; }
  if(VIEW==='list'){ wrap.className='plist'; wrap.innerHTML=list.map(o=>`<button class="prow" data-open="${esc(o.ref)}"><span class="r">#${esc(o.ref)}</span><span class="n">${esc(o.name||o.email||'')}</span><span class="plan">${esc(planName(o.plan))}</span>${dlBadge(o)}${spill(o.state)}</button>`).join(''); }
  else { wrap.className='kanban'; wrap.innerHTML=['todo','progress','done'].map(st=>{ const [c,l,col]=STATE[st]; const items=list.filter(o=>(o.state||'todo')===st); return `<div class="kcol"><div class="kcol__h"><span class="dot" style="background:${col}"></span>${l}<span class="c">${items.length}</span></div>${items.map(pcard).join('')||'<div class="none" style="color:var(--grey);font-size:12.5px;padding:6px">No projects</div>'}</div>`; }).join(''); }
  wrap.querySelectorAll('[data-open]').forEach(el=>el.onclick=()=>openOrder(el.dataset.open));
}

/* ---------- new project (owner) ---------- */
$('#newProject').onclick=openNewModal;
$('#npClose').onclick=()=>$('#newModal').classList.add('hide');
$('#newModal').addEventListener('click',e=>{ if(e.target.id==='newModal') $('#newModal').classList.add('hide'); });
$('#npPlan').addEventListener('change',()=>{ const n=PLAN_PACK[$('#npPlan').value]; if(n!=null) $('#npDecks').value=n; });
async function openNewModal(){
  if(ME&&ME.is_owner&&!TALENTS.length){ try{ const t=await api('/api/admin',{action:'list_talents'}); if(t.ok) TALENTS=t.talents||[]; }catch(e){} }
  $('#npForm').reset(); $('#npPlan').value='burst'; $('#npDecks').value=PLAN_PACK.burst; $('#npErr').textContent='';
  $('#npTalent').innerHTML='<option value="">Unassigned</option>'+(TALENTS||[]).filter(t=>!t.is_owner).map(t=>`<option value="${esc(t.email)}">${esc(t.name||t.email)}</option>`).join('');
  $('#newModal').classList.remove('hide'); setTimeout(()=>$('#npName').focus(),30);
}
$('#npForm').addEventListener('submit',async e=>{
  e.preventDefault(); $('#npErr').textContent='';
  const btn=$('#npSubmit'); btn.disabled=true; const old=btn.textContent; btn.innerHTML='<span class="spin"></span>';
  try{
    const r=await api('/api/admin',{action:'create_order',
      name:$('#npName').value.trim(), email:$('#npEmail').value.trim(), instagram:$('#npIg').value.trim(),
      plan:$('#npPlan').value, decks:Number($('#npDecks').value)||0, talentEmail:$('#npTalent').value||null});
    if(!r.ok){ $('#npErr').textContent='Could not create ('+(r.error||'error')+').'; return; }
    ORDERS=r.orders||ORDERS; $('#newModal').classList.add('hide'); renderProjects();
    if(r.ref) openOrder(r.ref);
  }catch(e){ $('#npErr').textContent='Network error.'; }
  finally{ btn.disabled=false; btn.textContent=old; }
});

/* ---------- detail ---------- */
$('#back').onclick=()=>{ $('#detail').classList.add('hide'); $('#overview').classList.remove('hide'); REF=''; };
$('#deckList').addEventListener('click',e=>{ const it=e.target.closest('[data-pick]'); if(!it) return; SELDECK=it.dataset.pick; renderDeckList(); renderDeckDetail(); });
$('#deckDetail').addEventListener('click',e=>{ const x=e.target.closest('[data-x]'); if(!x) return; x.closest('figure')?.remove(); const det=$('#deckDetail'), c=det.querySelector('[data-count]'); if(c) c.textContent=det.querySelectorAll('[data-imgs] img').length; });
async function openOrder(ref){
  REF=ref.replace(/^#/,'');
  const d=await api('/api/admin',{action:'get',ref:REF});
  if(!d.ok){ alert(d.error==='forbidden'?'Not your project.':'Order not found'); return; }
  $('#overview').classList.add('hide'); $('#detail').classList.remove('hide');
  $('#oName').innerHTML='#'+esc(d.order.ref)+' · '+esc(d.order.name||d.order.email);
  $('#oMeta').textContent=[d.order.plan?planName(d.order.plan)+' pack':'',d.order.email].filter(Boolean).join(' · ');
  $('#oDeadline').innerHTML=dlBadge(d.order,(d.decks||[]).length);
  $('#addDeck').style.display=(ME&&ME.is_owner)?'':'none';   // talents don't add elements
  SELDECK=null; renderBoard(d.decks||[]);
}
$('#addDeck').onclick=async()=>{ const title=prompt('Element title','New deck'); if(title===null) return; const d=await api('/api/admin',{action:'add_deck',ref:REF,title}); renderBoard(d.decks||[]); };

/* ---------- decks ---------- */
const PILL={writing:['pill--wait','Writing'],script_review:['pill--act','Script · awaiting client'],designing:['pill--act','Designing'],design_review:['pill--act','Design · awaiting client'],revision:['pill--act','Retouch requested'],done:['pill--done','Done ✓']};
let DECKS=[], SELDECK=null;
function renderBoard(decks){
  DECKS=decks||[];
  if(!DECKS.length){ $('#deckList').innerHTML=''; $('#deckDetail').innerHTML='<div class="empty">No elements yet. Add one to start.</div>'; return; }
  if(!DECKS.some(d=>d.id===SELDECK)) SELDECK=DECKS[0].id;
  renderDeckList(); renderDeckDetail();
}
function renderDeckList(){
  $('#deckList').innerHTML=DECKS.map(d=>{
    const [pc,pl]=PILL[d.status]||PILL.writing, ic=TYPE_ICON[d.type]||TYPE_ICON.carousel, sel=d.id===SELDECK?'sel':'';
    return `<button type="button" class="deckitem ${sel}" data-pick="${d.id}">
      <div class="deckitem__top"><span class="deckitem__title">${ic}<span>${esc(d.title)}</span></span></div>
      <div class="miniprog"><i style="width:${DPCT[d.status]||10}%"></i></div>
      <span class="pill ${pc} deckitem__pill">${pl}</span>
    </button>`;
  }).join('');
}
function renderDeckDetail(){
  const d=DECKS.find(x=>x.id===SELDECK);
  if(!d){ $('#deckDetail').innerHTML='<div class="empty">Select an element on the left.</div>'; $('#deckCmd').innerHTML=''; return; }
  $('#deckDetail').innerHTML=detailHTML(d);
  $('#deckCmd').innerHTML=cmdHTML(d);
  bind(d);
}
function imagesOf(d){ return Array.isArray(d.design_urls)&&d.design_urls.length?d.design_urls:(d.design_url?[d.design_url]:[]); }
const T_INSTR={
  writing:'✍️ Write the script for this element, then send it to the client for approval.',
  script_review:'📤 Script sent, awaiting the client’s approval. You can still update &amp; resend.',
  designing:'🎨 Script approved, upload the design and send it to the client.',
  design_review:'📤 Design sent, awaiting the client’s approval.',
  revision:'✏️ The client requested a retouch, update the design and resend.',
  done:'✅ Approved by the client, ready to post.',
};
function tThumb(u,editable){ return `<figure><img src="${esc(u)}" alt="">${editable?'<button class="x" data-x title="Remove">✕</button>':''}</figure>`; }
function detailHTML(d){
  const scriptEdit=d.status==='writing'||d.status==='script_review';
  const head=`<div class="detail__head"><input class="detail__titleinput" data-f="title" value="${esc(d.title)}">${(ME&&ME.is_owner)?'<button class="b-del b-sm" data-a="delete_deck">Delete</button>':''}</div>`;
  const instr=`<p class="detail__instr">${T_INSTR[d.status]||''}</p>`;
  let body;
  if(scriptEdit){
    body=`<textarea data-f="script" placeholder="Write the post script / copy…">${esc(d.script)}</textarea>`;
  } else {
    const imgs=imagesOf(d), editable=d.status!=='done';
    const note=(d.status==='revision'&&d.revision_note)?`<p class="note-line"><b>Client retouch:</b> ${esc(d.revision_note)}</p>`:'';
    const grid=`<div class="imgcount"><span data-count>${imgs.length}</span>/10 images</div>
      <div class="gal" data-imgs>${imgs.map(u=>tThumb(u,editable)).join('')}${editable?'<label class="adder">+ Add<br>images<input type="file" accept="image/*" multiple hidden data-file></label>':''}</div>`;
    const sc=d.script?`<details class="tscript"><summary>View approved script</summary><div class="scriptview">${esc(d.script)}</div></details>`:'';
    body=note+grid+sc;
  }
  return head+instr+`<div class="detail__body">${body}</div>`;
}
function cmdHTML(d){
  const [pc,pl]=PILL[d.status]||PILL.writing, imgs=imagesOf(d);
  let actions='';
  if(d.status==='writing') actions=`<button class="b-ghost b-sm" data-a="save_deck">Save draft</button><button class="b-grad b-sm" data-a="send_script">Send script →</button>`;
  else if(d.status==='script_review') actions=`<button class="b-ghost b-sm" data-a="save_deck">Save draft</button><button class="b-grad b-sm" data-a="send_script">Update &amp; resend</button>`;
  else if(d.status==='designing') actions=`<button class="b-ghost b-sm" data-a="save_deck">Save draft</button><button class="b-grad b-sm" data-a="send_design">Send design →</button>`;
  else if(d.status==='design_review'||d.status==='revision') actions=`<button class="b-grad b-sm" data-a="send_design">Update &amp; resend</button>`;
  const meta=`<div class="cmdbar__meta">${imgs.length?`<span class="foot-count">${imgs.length} image${imgs.length>1?'s':''}</span>`:''}<span class="pill ${pc}">${pl}</span></div>`;
  const right=actions?`<div class="actions">${actions}</div>`:`<span class="cmdbar__hint">Approved, nothing to do here.</span>`;
  return `<div class="cmdbar__row">${meta}${right}</div><div class="cmdprog"><i style="width:${DPCT[d.status]||10}%"></i></div>`;
}
function bind(d){
  const det=$('#deckDetail'), root=document.querySelector('.board__right'); if(!root) return;
  const val=f=>{ const el=det.querySelector(`[data-f="${f}"]`); return el?el.value:undefined; };
  const gatherImgs=()=>[...det.querySelectorAll('[data-imgs] img')].map(i=>i.getAttribute('src'));
  const file=det.querySelector('[data-file]');
  if(file) file.onchange=async e=>{
    const adder=det.querySelector('.adder'); const slots=10-det.querySelectorAll('[data-imgs] img').length;
    const files=[...e.target.files].slice(0,Math.max(0,slots));
    if(e.target.files.length>slots) alert('Max 10 images per element, extra files were skipped.');
    for(const f of files){ const url=await compress(f); adder.insertAdjacentHTML('beforebegin',tThumb(url,true)); }
    const c=det.querySelector('[data-count]'); if(c) c.textContent=det.querySelectorAll('[data-imgs] img').length;
    e.target.value='';
  };
  root.querySelectorAll('[data-a]').forEach(btn=>btn.onclick=async()=>{
    const a=btn.dataset.a;
    if(a==='delete_deck'&&!confirm('Delete this element?')) return;
    if(a==='send_script'&&!confirm('Send this script to the client for approval?')) return;
    if(a==='send_design'){ if(!gatherImgs().length){ alert('Add at least one image first.'); return; } if(!confirm('Send this design to the client for approval?')) return; }
    const body={action:a,ref:REF,deckId:d.id,title:val('title'),script:val('script'),images:gatherImgs()};
    const old=btn.innerHTML; btn.disabled=true; btn.innerHTML='<span class="spin"></span>';
    try{ const r=await api('/api/admin',body); if(r.ok) renderBoard(r.decks||[]); else { alert('Error: '+(r.error||'')); btn.disabled=false; btn.innerHTML=old; } }
    catch(e){ btn.disabled=false; btn.innerHTML=old; }
  });
}

/* ---------- team (owner) ---------- */
async function loadTeam(){
  const [t,o]=await Promise.all([api('/api/admin',{action:'list_talents'}),api('/api/admin',{action:'list'})]);
  TALENTS=t.talents||[]; ORDERS=o.orders||[]; renderTeam();
}
function donut(c){
  const total=c.todo+c.progress+c.done;
  if(!total) return `<div class="donut empty"><div class="hole"><b>0</b><span>projects</span></div></div>`;
  const seg=[['#dc2626',c.todo],['#2563eb',c.progress],['#16a34a',c.done]]; let acc=0, stops=[];
  seg.forEach(([col,n])=>{ if(n>0){ const a=(acc/total*360).toFixed(1), b=((acc+n)/total*360).toFixed(1); stops.push(`${col} ${a}deg ${b}deg`); } acc+=n; });
  return `<div class="donut" style="background:conic-gradient(${stops.join(',')})"><div class="hole"><b>${total}</b><span>projects</span></div></div>`;
}
function renderTeam(){
  const unassigned=ORDERS.filter(o=>!o.talent_email);
  $('#teamGrid').innerHTML=TALENTS.map(t=>{
    const mine=ORDERS.filter(o=>(o.talent_email||'').toLowerCase()===t.email.toLowerCase());
    const c={todo:0,progress:0,done:0}; mine.forEach(o=>c[o.state||'todo']++);
    const chips=t.is_owner?'<div class="none">Owners see every project.</div>'
      :(mine.length?`<div class="chips">${mine.map(o=>`<span class="chip">#${esc(o.ref)}<button data-unassign="${esc(o.ref)}" title="Remove">✕</button></span>`).join('')}</div>`:'<div class="none">No projects assigned.</div>');
    const assignSel=t.is_owner?'':`<select data-assign-for="${esc(t.email)}" style="margin-top:8px"><option value="">+ Assign a project…</option>${unassigned.map(o=>`<option value="${esc(o.ref)}">#${esc(o.ref)}, ${esc(o.name||o.email||'')}</option>`).join('')}</select>`;
    const mid=t.is_owner?'':`<div class="tcard__mid">${donut(c)}<div class="legend"><span><i style="background:#dc2626"></i>${c.todo} to start</span><span><i style="background:#2563eb"></i>${c.progress} in progress</span><span><i style="background:#16a34a"></i>${c.done} completed</span></div></div>`;
    return `<div class="tcard" data-talent="${esc(t.email)}">
      <div class="tcard__top">
        <label class="avwrap" title="Change photo">${avatar(t,'sm')}<input type="file" accept="image/*" hidden data-photo></label>
        <div style="min-width:0"><div class="nm">${esc(t.name||'Unnamed')}</div><div class="em">${esc(t.email)}</div></div>
        <span class="rolebadge ${t.is_owner?'owner':'talent'}" style="margin-left:auto">${t.is_owner?'Owner':'Talent'}</span></div>
      ${mid}
      <div><div class="sec">Projects</div>${chips}${assignSel}</div>
      <div class="actions"><button class="b-ghost b-sm" data-edit>Edit</button><button class="b-del b-sm" data-del>Delete</button></div>
    </div>`;
  }).join('')||'<div class="none">No talents yet.</div>';
  bindTeam();
}
function bindTeam(){
  document.querySelectorAll('[data-unassign]').forEach(b=>b.onclick=async()=>{ const r=await api('/api/admin',{action:'assign_order',ref:b.dataset.unassign,talentEmail:null}); if(r.ok){ ORDERS=r.orders||ORDERS; renderTeam(); } });
  document.querySelectorAll('[data-assign-for]').forEach(s=>s.onchange=async()=>{ if(!s.value) return; const r=await api('/api/admin',{action:'assign_order',ref:s.value,talentEmail:s.dataset.assignFor}); if(r.ok){ ORDERS=r.orders||ORDERS; renderTeam(); } });
  document.querySelectorAll('.tcard [data-photo]').forEach(inp=>inp.onchange=async e=>{ const f=e.target.files[0]; if(!f) return; const email=inp.closest('.tcard').dataset.talent; const photo=await compress(f,512,0.8); const r=await api('/api/admin',{action:'update_talent',email,photo}); if(r.ok){ TALENTS=r.talents||TALENTS; renderTeam(); } e.target.value=''; });
  document.querySelectorAll('.tcard [data-del]').forEach(b=>b.onclick=async()=>{
    const email=b.closest('.tcard').dataset.talent;
    if(!confirm('Delete '+email+'? Their projects will become unassigned.')) return;
    const r=await api('/api/admin',{action:'delete_talent',email});
    if(!r.ok){ alert(r.error==='self'?"You can't delete your own account.":'Error: '+(r.error||'')); return; }
    TALENTS=r.talents||TALENTS; ORDERS=r.orders||ORDERS; renderTeam();
  });
  document.querySelectorAll('.tcard [data-edit]').forEach(b=>b.onclick=async()=>{
    const email=b.closest('.tcard').dataset.talent; const t=TALENTS.find(x=>x.email===email);
    const name=prompt('Name', t.name||''); if(name===null) return;
    const pass=prompt('New password (leave blank to keep current):',''); if(pass===null) return;
    const r=await api('/api/admin',{action:'update_talent',email,name,...(pass?{password:pass}:{})});
    if(!r.ok){ alert('Error: '+(r.error||'')); return; }
    TALENTS=r.talents||TALENTS; renderTeam();
  });
}
$('#talentForm').addEventListener('submit',async e=>{
  e.preventDefault(); const errEl=$('#tErr'); errEl.style.color=''; errEl.textContent='';
  const body={action:'create_talent',name:$('#tName').value.trim(),email:$('#tEmail').value.trim(),is_owner:$('#tOwner').checked};
  const r=await api('/api/admin',body);
  if(!r.ok){ errEl.textContent=r.error==='exists'?'Email already exists.':'Error: '+(r.error||''); return; }
  TALENTS=r.talents||TALENTS; $('#talentForm').reset();
  errEl.style.color='#15803d'; errEl.textContent='Invite sent ✅';
  renderTeam();
});

/* ---------- image compression ---------- */
function compress(file, max=1280, q=0.72){
  return new Promise(res=>{
    const img=new Image();
    img.onload=()=>{ let {width:w,height:h}=img; if(w>max||h>max){ const s=max/Math.max(w,h); w=Math.round(w*s); h=Math.round(h*s); }
      const c=document.createElement('canvas'); c.width=w; c.height=h; c.getContext('2d').drawImage(img,0,0,w,h); res(c.toDataURL('image/jpeg',q)); };
    img.onerror=()=>res('');
    const fr=new FileReader(); fr.onload=()=>{ img.src=fr.result; }; fr.readAsDataURL(file);
  });
}

if(TOKEN && !SETUP_TOKEN){ boot().catch(()=>{}); }
